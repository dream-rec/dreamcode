name: Build and Release Electron App

on:
  push:
    tags:
      - 'v*' # Trigger only on version tags like v1.0.0
  workflow_dispatch:

permissions:
  contents: write # required for creating releases & uploading assets

jobs:
  build:
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - name: windows
            runner: windows-latest
            build_script: build:win
            artifact_name: electron-build-windows
          - name: macos-x64
            runner: macos-15-intel
            build_script: build:mac
            artifact_name: electron-build-macos-x64
          - name: macos-arm64
            runner: macos-15
            build_script: build:mac
            artifact_name: electron-build-macos-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Package Electron app
        run: npm run ${{ matrix.build_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/** # electron-builder output folder

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/**/dreamcode-*-setup.exe
            dist/**/dreamcode-*-portable.exe
            dist/**/dreamcode-*.dmg
            dist/**/latest-mac.yml
            dist/**/latest-windows.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
